<svg viewBox="0 0 64 64" width="512" height="512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow2a" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2b" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background tile -->
  <rect width="64" height="64" rx="13" fill="#191919"/>
  <!-- Subtle blue inner tint -->
  <rect width="64" height="64" rx="13" fill="#1C54D4" opacity="0.05"/>

  <!-- L stroke -->
  <path d="M18 12 L18 50 L48 50" stroke="#1C54D4" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow halo on L -->
  <path d="M18 12 L18 50 L48 50" stroke="#1C54D4" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" opacity="0.12" filter="url(#glow2a)"/>

  <!-- Circuit node at L corner — outer glow -->
  <circle cx="18" cy="50" r="6.5" fill="#1C54D4" filter="url(#glow2a)"/>
  <!-- Node fill -->
  <circle cx="18" cy="50" r="3.5" fill="#1C54D4"/>
  <!-- White lumen core -->
  <circle cx="18" cy="50" r="2" fill="#FFFFFF"/>

  <!-- Small node at top of L -->
  <circle cx="18" cy="12" r="3.5" fill="#1C54D4" opacity="0.55" filter="url(#glow2b)"/>
  <circle cx="18" cy="12" r="1.5" fill="#1C54D4"/>

  <!-- Trace arm extending from bottom-right -->
  <path d="M48 50 L57 41" stroke="#1C54D4" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
  <circle cx="57" cy="41" r="2.2" fill="#1C54D4" opacity="0.45" filter="url(#glow2b)"/>
</svg>